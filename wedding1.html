<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>20桌婚礼 · 优化操作</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #f5e3df;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            touch-action: pan-y;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: #fffaf5;
            box-shadow: 0 25px 50px -8px rgba(140, 70, 60, 0.3);
            overflow: hidden;
            border: 1px solid #fcd0c6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 用户栏 */
        .user-bar {
            background: #ffffffdd;
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ffc3b0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #b13e3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .user-name {
            font-weight: 600;
            color: #642f27;
        }

        .save-status {
            font-size: 12px;
            color: #4CAF50;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* 固定按钮栏 */
        .fixed-button-container {
            display: flex;
            justify-content: center;
            padding: 8px 0;
            background: #fffaf5;
            border-bottom: 1px solid #ffd9d4;
            z-index: 90;
        }

        .center-buttons {
            display: flex;
            gap: 12px;
            background: #ffffffdd;
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(177, 62, 62, 0.2);
            border: 1px solid #ffb4a2;
        }

        .icon-btn {
            background: #fff2ed;
            border: 1px solid #ffb4a2;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 500;
            color: #642f27;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(190, 80, 60, 0.2);
            transition: 0.15s;
        }

        .icon-btn:active {
            background: #ffe0d6;
            transform: scale(0.96);
        }

        /* 画布区域 - 优化：缩放时禁止移动桌子 */
        .canvas-wrapper {
            flex: 1;
            background: #faf0ea;
            background-image: radial-gradient(circle at 20px 20px, #f0d9d1 2px, transparent 2px), 
                              radial-gradient(circle at 80px 150px, #f0d9d1 2px, transparent 2px);
            background-size: 60px 60px, 120px 120px;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        #zoomContainer {
            position: relative;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            background: transparent;
            will-change: transform;
        }

        #dragCanvas {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* 舞台 - 现在可以随意移动（和桌子一样） */
        .stage-marker {
            position: absolute;
            background: #c93f2b;
            color: #ffefc0;
            font-size: 24px;
            font-weight: 800;
            padding: 12px 30px;
            border-radius: 60px;
            box-shadow: 0 8px 0 #752e1e, 0 10px 20px #ac4b38;
            z-index: 15;
            border: 3px solid #ffc4a2;
            letter-spacing: 4px;
            white-space: nowrap;
            cursor: grab;
            touch-action: none;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 80px;
        }

        .stage-marker:active {
            cursor: grabbing;
        }

        /* 桌子样式 */
        .table-drag-item {
            position: absolute;
            width: 150px;
            height: 150px;
            background: #fff9f2;
            border-radius: 50%;
            box-shadow: 0 12px 22px rgba(150, 70, 50, 0.4), 0 0 0 3px #ffc2b0 inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            touch-action: none;
            border: 3px solid #d86b56;
            will-change: left, top;
            z-index: 10;
        }

        .table-drag-item:active {
            cursor: grabbing;
        }

        /* 编辑按钮 - 新增：点击进入编辑页面 */
        .edit-table-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #4a90e2;
            color: white;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid white;
            box-shadow: 0 4px 8px #2a4b7a;
            cursor: pointer;
            z-index: 200;
        }

        .delete-table-btn {
            position: absolute;
            top: -8px;
            left: -8px;
            background: #c43d3d;
            color: white;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid white;
            box-shadow: 0 4px 8px #6b2f2f;
            cursor: pointer;
            z-index: 200;
        }

        .table-center-name {
            background: #b44934;
            color: white;
            font-weight: bold;
            font-size: 15px;
            padding: 6px 12px;
            border-radius: 40px;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 2px solid #ffc2a1;
            box-shadow: 0 2px 8px #461b13;
            z-index: 3;
        }

        /* 宾客名牌 */
        .guest-chip {
            position: absolute;
            background: #fcedda;
            border: 2px solid #e07e66;
            border-radius: 40px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            color: #522e24;
            white-space: nowrap;
            max-width: 85px;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 3px 6px rgba(110, 40, 20, 0.2);
            pointer-events: none;  /* 禁止直接点击，统一由编辑页面管理 */
            transform: translate(-50%, -50%);
            z-index: 20;
            background: #fff3e9;
        }

        .guest-chip.empty {
            border: 2px dashed #d49b8a;
            background: #fae2da;
            color: #a56553;
        }

        /* 底部工具栏 */
        .footer-panel {
            background: #fff6f0;
            padding: 12px 16px;
            border-top: 1px solid #ffbba8;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .big-add-btn {
            background: #b13e3e;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 18px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .reset-btn {
            background: #f8e3dc;
            border: 1px solid #c95f48;
            border-radius: 40px;
            padding: 12px 16px;
            font-size: 16px;
            color: #773d30;
        }

        /* ===== 编辑页面 (第二页面) ===== */
        .edit-page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fffaf5;
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .edit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ffc3b0;
        }

        .edit-header h2 {
            color: #b13e3e;
            font-size: 24px;
        }

        .close-edit {
            background: #f8e3dc;
            border: 1px solid #c95f48;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 16px;
            color: #773d30;
        }

        .edit-table-name {
            margin-bottom: 20px;
        }

        .edit-table-name label {
            display: block;
            color: #642f27;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .edit-table-name input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffc3b0;
            border-radius: 30px;
            font-size: 18px;
            background: white;
        }

        .edit-guests-title {
            color: #642f27;
            font-weight: 600;
            margin: 20px 0 10px;
        }

        .guest-edit-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .guest-edit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff0ea;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #ffc3b0;
        }

        .guest-edit-item .seat-number {
            width: 40px;
            color: #b13e3e;
            font-weight: 600;
        }

        .guest-edit-item input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffc3b0;
            border-radius: 30px;
            font-size: 16px;
            background: white;
        }

        .save-edit-btn {
            background: #b13e3e;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }

        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 40px;
            width: 300px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ffc3b0;
            border-radius: 30px;
            font-size: 16px;
        }

        .login-box button {
            background: #b13e3e;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 主界面 -->
    <div class="user-bar">
        <div class="user-info" id="userInfo">
            <div class="user-avatar">👤</div>
            <span class="user-name" id="userNameDisplay">加载中...</span>
        </div>
        <div class="save-status" id="saveStatus">💾 已保存</div>
    </div>

    <div class="fixed-button-container">
        <div class="center-buttons">
            <button class="icon-btn" id="resetViewBtn"><span>🔍</span> 缩放</button>
            <button class="icon-btn" id="resetPositionsBtn"><span>🔄</span> 复位</button>
        </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <div id="zoomContainer" style="transform: scale(0.9);">
            <div id="dragCanvas">
                <div class="stage-marker" id="stageMarker">✨ 主舞台 ✨</div>
            </div>
        </div>
    </div>

    <div class="footer-panel">
        <button class="big-add-btn" id="addTableBtn">➕ 增加圆桌</button>
        <button class="reset-btn" id="resetExampleBtn">🔄 重置20桌</button>
    </div>

    <!-- 第二页面：编辑桌子信息 -->
    <div class="edit-page" id="editPage">
        <div class="edit-header">
            <h2 id="editTableTitle">编辑桌子</h2>
            <button class="close-edit" id="closeEditBtn">✕ 关闭</button>
        </div>
        
        <div class="edit-table-name">
            <label>桌子名称</label>
            <input type="text" id="editTableNameInput" placeholder="输入桌名">
        </div>

        <div class="edit-guests-title">宾客名单 (10人)</div>
        <div class="guest-edit-list" id="guestEditList">
            <!-- 动态生成10个输入框 -->
        </div>

        <button class="save-edit-btn" id="saveEditBtn">💾 保存修改</button>
    </div>

    <!-- 登录模态框 -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2 style="color: #b13e3e;">🎉 婚礼策划师</h2>
            <input type="text" id="usernameInput" placeholder="输入昵称" value="婚礼总管">
            <button id="loginBtn">进入20桌婚礼</button>
        </div>
    </div>
</div>

<script>
    (function() {
        let currentUser = localStorage.getItem('wedding_user') || '婚礼总管';
        let tables = [];
        let stagePos = { left: 50, top: 80 };
        let currentEditTableId = null; // 当前正在编辑的桌子ID

        // 生成20桌数据
        function generate20Tables() {
            const newTables = [];
            const names = ['主婚桌', '至亲桌', '贵宾1', '贵宾2', '贵宾3', '朋友A', '朋友B', '朋友C', '同事A', '同事B', 
                          '同事C', '同学A', '同学B', '同学C', '亲友1', '亲友2', '亲友3', '亲友4', '亲友5', '亲友6'];
            
            const cols = 4;
            const rows = 5;
            const startX = 60;
            const startY = 150;
            const spacingX = 200;
            const spacingY = 200;

            for (let i = 0; i < 20; i++) {
                const row = Math.floor(i / cols);
                const col = i % cols;
                
                const left = startX + col * spacingX + (Math.random() * 20 - 10);
                const top = startY + row * spacingY + (Math.random() * 20 - 10);
                
                const guests = [];
                for (let j = 0; j < 10; j++) {
                    if (i === 0 && j < 4) {
                        const sampleNames = ['张建国', '李秀芬', '王磊', '赵丽'];
                        guests.push(sampleNames[j] || '');
                    } else if (i === 1 && j < 3) {
                        const sampleNames = ['陈红', '刘伟', '周杰'];
                        guests.push(sampleNames[j] || '');
                    } else {
                        guests.push('');
                    }
                }

                newTables.push({
                    id: 'table_' + i + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    name: names[i] || `桌 ${i+1}`,
                    seats: 10,
                    left: left,
                    top: top,
                    guests: guests
                });
            }
            return newTables;
        }

        // 加载数据
        try {
            const saved = localStorage.getItem(`wedding_tables_${currentUser}`);
            if (saved) {
                tables = JSON.parse(saved);
                tables.forEach(table => {
                    if (table.seats !== 10) {
                        table.seats = 10;
                        if (table.guests.length > 10) table.guests = table.guests.slice(0, 10);
                        else if (table.guests.length < 10) {
                            table.guests = [...table.guests, ...Array(10 - table.guests.length).fill('')];
                        }
                    }
                });
            } else {
                tables = generate20Tables();
            }
            
            const savedStage = localStorage.getItem(`wedding_stage_${currentUser}`);
            if (savedStage) {
                stagePos = JSON.parse(savedStage);
            }
        } catch (e) {
            tables = generate20Tables();
        }

        document.getElementById('userNameDisplay').textContent = currentUser;

        const canvas = document.getElementById('dragCanvas');
        const wrapper = document.getElementById('canvasWrapper');
        const zoomContainer = document.getElementById('zoomContainer');
        const stageMarker = document.getElementById('stageMarker');
        const editPage = document.getElementById('editPage');
        const editTableNameInput = document.getElementById('editTableNameInput');
        const guestEditList = document.getElementById('guestEditList');
        const closeEditBtn = document.getElementById('closeEditBtn');
        const saveEditBtn = document.getElementById('saveEditBtn');

        let scale = 0.9;
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 2.5;
        let lastDistance = 0;
        let isDragging = false; // 标记是否正在拖拽，用于区分缩放和拖拽

        // 保存数据
        function saveToStorage() {
            try {
                localStorage.setItem(`wedding_tables_${currentUser}`, JSON.stringify(tables));
                localStorage.setItem(`wedding_stage_${currentUser}`, JSON.stringify(stagePos));
                document.getElementById('saveStatus').innerHTML = '💾 已保存 ' + new Date().toLocaleTimeString().substr(0,5);
                setTimeout(() => {
                    document.getElementById('saveStatus').innerHTML = '💾 已保存';
                }, 2000);
            } catch (e) {}
        }

        // 绘制主画布
        function renderTables() {
            canvas.innerHTML = '';
            canvas.appendChild(stageMarker);
            
            stageMarker.style.left = stagePos.left + '%';
            stageMarker.style.top = stagePos.top + 'px';

            tables.forEach(table => {
                if (table.guests.length > 10) table.guests = table.guests.slice(0, 10);
                if (table.guests.length < 10) {
                    table.guests = [...table.guests, ...Array(10 - table.guests.length).fill('')];
                }
                table.seats = 10;

                const tableDiv = document.createElement('div');
                tableDiv.className = 'table-drag-item';
                tableDiv.id = table.id;
                tableDiv.style.left = table.left + 'px';
                tableDiv.style.top = table.top + 'px';

                // 删除按钮
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'delete-table-btn';
                deleteBtn.textContent = '🗑️';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    tables = tables.filter(t => t.id !== table.id);
                    renderTables();
                    saveToStorage();
                });
                tableDiv.appendChild(deleteBtn);

                // 编辑按钮 - 点击进入第二页面
                const editBtn = document.createElement('div');
                editBtn.className = 'edit-table-btn';
                editBtn.textContent = '✎';
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditPage(table.id);
                });
                tableDiv.appendChild(editBtn);

                // 桌名
                const nameSpan = document.createElement('div');
                nameSpan.className = 'table-center-name';
                nameSpan.textContent = table.name;
                tableDiv.appendChild(nameSpan);

                // 10个宾客座位
                const centerX = 75, centerY = 75, radius = 58;
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * 2 * Math.PI - Math.PI/2;
                    const x = centerX + radius * Math.cos(angle);
                    const y = centerY + radius * Math.sin(angle);
                    const guestName = table.guests[i] || '';
                    const chip = document.createElement('div');
                    chip.className = 'guest-chip' + (guestName === '' ? ' empty' : '');
                    chip.textContent = guestName === '' ? '空位' : guestName;
                    chip.style.left = x + 'px';
                    chip.style.top = y + 'px';
                    tableDiv.appendChild(chip);
                }

                canvas.appendChild(tableDiv);
            });

            makeDraggable();
            saveToStorage();
        }

        // 打开编辑页面
        function openEditPage(tableId) {
            const table = tables.find(t => t.id === tableId);
            if (!table) return;

            currentEditTableId = tableId;
            document.getElementById('editTableTitle').textContent = `编辑 - ${table.name}`;
            editTableNameInput.value = table.name;

            // 生成10个宾客输入框
            let html = '';
            for (let i = 0; i < 10; i++) {
                const guestName = table.guests[i] || '';
                html += `
                    <div class="guest-edit-item">
                        <span class="seat-number">#${i+1}</span>
                        <input type="text" class="guest-edit-input" data-seat="${i}" value="${escapeHtml(guestName)}" placeholder="宾客姓名">
                    </div>
                `;
            }
            guestEditList.innerHTML = html;

            // 显示编辑页面，隐藏主界面操作（但保留画布在背后）
            editPage.style.display = 'flex';
        }

        // 辅助转义
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        // 关闭编辑页面
        closeEditBtn.addEventListener('click', () => {
            editPage.style.display = 'none';
        });

        // 保存编辑
        saveEditBtn.addEventListener('click', () => {
            if (!currentEditTableId) return;

            const table = tables.find(t => t.id === currentEditTableId);
            if (!table) return;

            // 更新桌名
            table.name = editTableNameInput.value.trim() || '未命名';

            // 更新宾客名单
            const inputs = document.querySelectorAll('.guest-edit-input');
            inputs.forEach(input => {
                const seat = input.getAttribute('data-seat');
                if (seat !== null) {
                    table.guests[parseInt(seat)] = input.value;
                }
            });

            // 重新渲染主画布
            renderTables();
            editPage.style.display = 'none';
            saveToStorage();
        });

        // 拖拽功能（桌子 + 舞台）- 优化：只有在非缩放状态且不是通过缩放触发时才启用
        function makeDraggable() {
            const draggables = document.querySelectorAll('.table-drag-item, #stageMarker');
            let activeElement = null;
            let offsetX, offsetY;

            const onPointerMove = (e) => {
                if (!activeElement || isDragging === false) return;
                e.preventDefault();

                const wrapperRect = wrapper.getBoundingClientRect();
                let clientX = e.clientX, clientY = e.clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }

                let newLeft = (clientX - wrapperRect.left) / scale - offsetX;
                let newTop = (clientY - wrapperRect.top) / scale - offsetY;

                const maxLeft = (wrapper.clientWidth / scale) - (activeElement.id === 'stageMarker' ? 180 : 150);
                const maxTop = (wrapper.clientHeight / scale) - (activeElement.id === 'stageMarker' ? 100 : 150);
                
                newLeft = Math.max(10, Math.min(newLeft, maxLeft));
                newTop = Math.max(10, Math.min(newTop, maxTop));

                if (activeElement.id === 'stageMarker') {
                    stagePos.left = (newLeft / (wrapper.clientWidth / scale)) * 100;
                    stagePos.top = newTop;
                    activeElement.style.left = stagePos.left + '%';
                    activeElement.style.top = stagePos.top + 'px';
                } else {
                    activeElement.style.left = newLeft + 'px';
                    activeElement.style.top = newTop + 'px';
                    
                    const tableId = activeElement.id;
                    const tableData = tables.find(t => t.id === tableId);
                    if (tableData) {
                        tableData.left = newLeft;
                        tableData.top = newTop;
                    }
                }
            };

            const onPointerUp = () => {
                if (activeElement) {
                    activeElement.style.cursor = 'grab';
                    activeElement = null;
                    isDragging = false;
                    saveToStorage();
                }
                document.removeEventListener('mousemove', onPointerMove);
                document.removeEventListener('mouseup', onPointerUp);
                document.removeEventListener('touchmove', onPointerMove);
                document.removeEventListener('touchend', onPointerUp);
            };

            const onPointerDown = (e) => {
                // 如果点击的是删除按钮或编辑按钮，不触发拖拽
                if (e.target.classList.contains('delete-table-btn') || 
                    e.target.classList.contains('edit-table-btn')) return;
                
                const target = e.target.closest('.table-drag-item, #stageMarker');
                if (!target) return;
                
                e.preventDefault();
                activeElement = target;
                activeElement.style.cursor = 'grabbing';
                isDragging = true;

                const wrapperRect = wrapper.getBoundingClientRect();
                let clientX = e.clientX, clientY = e.clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }

                if (activeElement.id === 'stageMarker') {
                    const currentLeft = (stagePos.left / 100) * (wrapper.clientWidth / scale);
                    offsetX = (clientX - wrapperRect.left) / scale - currentLeft;
                    offsetY = (clientY - wrapperRect.top) / scale - stagePos.top;
                } else {
                    offsetX = (clientX - wrapperRect.left) / scale - activeElement.offsetLeft;
                    offsetY = (clientY - wrapperRect.top) / scale - activeElement.offsetTop;
                }

                document.addEventListener('mousemove', onPointerMove);
                document.addEventListener('mouseup', onPointerUp);
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('touchend', onPointerUp);
            };

            draggables.forEach(el => {
                el.removeEventListener('mousedown', onPointerDown);
                el.removeEventListener('touchstart', onPointerDown);
                el.addEventListener('mousedown', onPointerDown);
                el.addEventListener('touchstart', onPointerDown, { passive: false });
            });
        }

        // 缩放功能 - 优化：缩放时不移动桌子
        function initPinchZoom() {
            wrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastDistance = Math.sqrt(dx * dx + dy * dy);
                    // 开始缩放时，禁止拖拽
                    isDragging = false;
                }
            });

            wrapper.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    // 缩放时强制禁止拖拽
                    isDragging = false;
                    
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (lastDistance > 0) {
                        const delta = distance / lastDistance;
                        let newScale = scale * delta;
                        newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                        setScale(newScale);
                    }
                    lastDistance = distance;
                }
            });

            wrapper.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    lastDistance = 0;
                }
            });
        }

        function setScale(newScale) {
            scale = newScale;
            zoomContainer.style.transform = `scale(${scale})`;
        }

        // 事件绑定
        document.getElementById('addTableBtn').addEventListener('click', () => {
            if (tables.length >= 30) {
                alert('最多30桌，已足够');
                return;
            }
            const newId = 'table_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            tables.push({
                id: newId,
                name: `新增桌 ${tables.length + 1}`,
                seats: 10,
                left: 100 + Math.random() * 200,
                top: 200 + Math.random() * 250,
                guests: Array(10).fill('')
            });
            renderTables();
        });

        document.getElementById('resetExampleBtn').addEventListener('click', () => {
            tables = generate20Tables();
            stagePos = { left: 50, top: 80 };
            renderTables();
        });

        document.getElementById('resetViewBtn').addEventListener('click', () => setScale(0.9));
        
        document.getElementById('resetPositionsBtn').addEventListener('click', () => {
            tables = generate20Tables();
            stagePos = { left: 50, top: 80 };
            renderTables();
        });

        // 登录
        const loginModal = document.getElementById('loginModal');
        if (!localStorage.getItem('wedding_user')) {
            loginModal.style.display = 'flex';
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('usernameInput').value || '婚礼总管';
            localStorage.setItem('wedding_user', username);
            currentUser = username;
            document.getElementById('userNameDisplay').textContent = username;
            loginModal.style.display = 'none';
            
            try {
                const saved = localStorage.getItem(`wedding_tables_${username}`);
                if (saved) {
                    tables = JSON.parse(saved);
                } else {
                    tables = generate20Tables();
                }
            } catch (e) {
                tables = generate20Tables();
            }
            renderTables();
        });

        // 初始化
        wrapper.style.touchAction = 'none';
        initPinchZoom();
        setScale(0.9);
        renderTables();

        // 自动保存
        setInterval(saveToStorage, 30000);
    })();
</script>
</body>
</html>
